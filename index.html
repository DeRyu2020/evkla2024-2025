<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuesioner EVKLA 2024-2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="radio"] { transform: scale(1.2); cursor: pointer; }
        /* Style untuk Modal Pop-up */
        #modalOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        #modalContent {
            background: white;
            width: 90%;
            height: 85%;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10">

    <div id="modalOverlay">
        <div id="modalContent">
            <div class="bg-gray-100 p-3 flex justify-between items-center border-b">
                <span class="font-bold text-gray-700">Preview Dokumen</span>
                <button onclick="closePreview()" class="bg-red-500 text-white px-4 py-1 rounded-lg font-bold">Tutup [X]</button>
            </div>
            <iframe id="previewFrame" src="" class="w-full h-full" frameborder="0"></iframe>
        </div>
    </div>

    <div class="max-w-2xl mx-auto mt-6 px-4">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden p-6">
            
            <div class="flex justify-center mb-4">
                <img src="https://drive.google.com/uc?export=view&id=1PMoOLO7L08bOiUt_1deXsROtLY1UhQ_x" 
                     alt="Logo" 
                     class="h-24 w-auto object-contain">
            </div>

            <h1 class="text-2xl font-bold text-center text-blue-700 mb-6">Kuesioner Evaluasi Mandiri Kabupaten Layak Anak 2024-2025</h1>
            
            <form id="surveyForm" class="space-y-6">
                
                <div class="grid grid-cols-2 gap-4 bg-blue-50 p-4 rounded-xl">
                    <div>
                        <label class="block font-semibold text-sm">Kecamatan</label>
                        <select id="kecamatan" class="w-full p-2 border rounded mt-1" required><option value="">Memuat...</option></select>
                    </div>
                    <div>
                        <label class="block font-semibold text-sm">Desa</label>
                        <select id="desa" class="w-full p-2 border rounded mt-1" required disabled><option value="">Pilih Kecamatan</option></select>
                    </div>
                </div>

                <div id="questions-container" class="space-y-6"></div>

                <button type="submit" id="btnSubmit" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-800 transition-all">
                    Kirim Laporan
                </button>
            </form>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwoxMt8LRiATbsSofJLDWFwR4HVlF8rhxxVPaCh_W94I-aVsji0OJx7dVP4JuKsiCGMWA/exec';
        
        const daftarPertanyaan = [
            "Apakah desa memiliki peraturan desa tentang pemenuhan hak dan perlindungan khusus anak ??",
            "Apakah desa memiliki anggaran untuk perlindungan anak? ",
            "Apakah desa memiliki Forum Anak Desa?",
            "Apakah Desa memiliki kelompok olahraga/kesenian anak/minat bakat anak lainnya??",
            "Apakah di desa memiliki kasus anak dengan gizi buruk?",
            "Apakah di desa memiliki kasus anak dengan gizi kurang? ",
            "Apakah di desa memiliki kasus anak dengan gizi lebih?",
            "Apakah di desa memiliki kasus anak dengan stunting??",
            "Apakah di desa semua anaknya mendapat pendidikan formal/non-formal?",
            "Apakah desa memiliki Kawasan Tanpa Rokok ?",
            "Apakah desa memiliki layanan PAUD-HI (Pengembangan Anak Usia Dini – Holistik Integratif) ? ",
            "Apakah Desa memiliki ruang/taman bermain bagi anak?",
            "Apakah desa melaksanakan fungsi Perlindungan Anak Terpadu Berbasis Masyarakat (PATBM) atau sejenisnya?",
            "Apakah desa memiliki profil desa yang memuat data pilah tentang anak menurut jenis kelamin, umur and berisi indikator desa/kelurahan layak anak? ",
            "Apakah terdapat anak yang bekerja di perkebunan/pertanian/melaut/asisten rumah tangga, dan lainnya?",
            "Apakah desa melakukan upaya untuk pendataan dan pencegahan pekerja anak?"
        ];

        const links = {
            1: "https://drive.google.com/file/d/1A2B3C4D5E6F/preview",
            2: "https://drive.google.com/file/d/1G7H8I9J0K1L/preview",
            3: "https://drive.google.com/file/d/1-w-FdjOmSFLuSSH0SSWD_HVmMpEEYHze/preview",
            4: "https://drive.google.com/file/d/1dKFOc5Qx8tgcMT55Ebne5IrHPTau6QFD/preview",
            10: "https://drive.google.com/file/d/1MNO5P6Q7R8S/preview",
            13: "https://drive.google.com/file/d/1TUV9W1X2Y3Z/preview",
            14: "https://drive.google.com/file/d/1B2C3D4E5F6G/preview",
            16: "https://drive.google.com/file/d/1H7I8J9K0L1M/preview"
        };

        const container = document.getElementById('questions-container');
        let databaseWilayah = {};

        daftarPertanyaan.forEach((tanya, i) => {
            let n = i + 1;
            let htmlLink = "";
            if(links[n]) {
                htmlLink = `<p class="text-xs mt-1 text-blue-600 font-normal italic">contoh : <button type="button" onclick="openPreview('${links[n]}')" class="underline hover:text-blue-800">Preview Dokumen</button></p>`;
            }

            container.innerHTML += `
                <div class="p-4 border rounded bg-gray-50">
                    <p class="font-medium text-gray-800">${n}. ${tanya}</p>
                    ${htmlLink}
                    <div class="flex gap-8 mb-2 mt-3">
                        <label class="flex items-center space-x-2"><input type="radio" name="p${n}" value="Ya" onclick="toggleUpload(${n}, true)" required> <span>Ya</span></label>
                        <label class="flex items-center space-x-2"><input type="radio" name="p${n}" value="Tidak" onclick="toggleUpload(${n}, false)" required> <span>Tidak</span></label>
                    </div>
                    <div id="u-${n}" style="display:none;" class="mt-3 p-3 bg-white border rounded">
                        <p class="text-[10px] font-bold text-blue-600 mb-1 uppercase">Upload Bukti (Max 1MB)</p>
                        <input type="file" id="f${n}" class="text-xs">
                    </div>
                </div>`;
        });

        function openPreview(url) {
            document.getElementById('previewFrame').src = url;
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        function closePreview() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('previewFrame').src = "";
        }

        function toggleUpload(id, show) {
            document.getElementById(`u-${id}`).style.display = show ? 'block' : 'none';
            if(!show) document.getElementById(`f${id}`).value = "";
        }

        fetch(scriptURL).then(res => res.json()).then(data => {
            databaseWilayah = data;
            const s = document.getElementById('kecamatan');
            s.innerHTML = '<option value="">-- Pilih Kecamatan --</option>';
            Object.keys(data).forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`);
        });

        document.getElementById('kecamatan').onchange = function() {
            const d = document.getElementById('desa');
            const list = databaseWilayah[this.value] || [];
            d.innerHTML = '<option value="">-- Pilih Desa --</option>';
            list.forEach(item => d.innerHTML += `<option value="${item}">${item}</option>`);
            d.disabled = list.length === 0;
        };

        document.getElementById('surveyForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = "Sedang Mengirim...";

            const dataObj = { kecamatan: document.getElementById('kecamatan').value, desa: document.getElementById('desa').value };
            
            for(let i=1; i<=16; i++) {
                const val = document.querySelector(`input[name="p${i}"]:checked`).value;
                dataObj['p'+i] = val;
                const f = document.getElementById('f'+i);
                if(val === "Ya" && f.files.length > 0) {
                    const file = f.files[0];
                    if (file.size > 1024 * 1024) {
                        alert(`File nomor ${i} terlalu besar (Max 1MB).`);
                        btn.disabled = false; btn.innerText = "Kirim Laporan";
                        return;
                    }
                    const base64 = await new Promise(r => {
                        const reader = new FileReader();
                        reader.onload = () => r(reader.result.split(',')[1]);
                        reader.readAsDataURL(file);
                    });
                    dataObj['fileData'+i] = { base64, type: file.type, name: file.name };
                }
            }

            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dataObj) })
            .then(() => { alert('Berhasil Terkirim!'); location.reload(); })
            .catch(() => { alert('Gagal!'); btn.disabled = false; btn.innerText = "Kirim Laporan"; });
        };
    </script>
</body>
</html>
